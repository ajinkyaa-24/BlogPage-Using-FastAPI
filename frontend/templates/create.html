{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h1>Write a New Post</h1>
    <form action="/create" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Post title..." required>
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" placeholder="Your name..." required>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="10" placeholder="Write your post here..." required></textarea>
        </div>
        <div class="form-actions">
            <a href="/" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-submit">Publish Post</button>
        </div>
    </form>
</div>
{% endblock %}
